<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="tiktok-developers-site-verification" content="g9UaZ7Wbo0mjnWcOsiSlxVDyYnz7QXoR" />
<title>TikTok Auth Callback - MONEYPRINTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1a1a2e; border: 1px solid #ffffff20; border-radius: 16px; padding: 40px; max-width: 520px; width: 90%; text-align: center; }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  h1 { font-size: 1.4rem; margin-bottom: 12px; }
  .code-box { background: #0d0d1a; border: 2px solid #c9a84c; border-radius: 8px; padding: 16px; margin: 20px 0; font-family: monospace; font-size: 0.9rem; word-break: break-all; color: #c9a84c; user-select: all; cursor: pointer; }
  .btn { background: #c9a84c; color: #000; border: none; padding: 12px 28px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1rem; margin-top: 8px; }
  .btn:hover { background: #e0b85a; }
  p { color: #888; font-size: 0.9rem; margin-top: 12px; }
  .step { background: #ffffff10; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 0.85rem; color: #aaa; text-align: left; }
  .step span { color: #c9a84c; font-weight: bold; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">İşleniyor...</h1>
  <div class="code-box" id="code-box" style="display:none" onclick="copyCode()" title="Tıkla ve kopyala"></div>
  <button class="btn" id="copy-btn" style="display:none" onclick="copyCode()">📋 Kodu Kopyala</button>
  <p id="msg"></p>
  <div class="step" id="step" style="display:none">
    <span>Sonraki adım:</span> Terminale git ve bu kodu yapıştır, Enter'a bas.
  </div>
</div>
<script>
  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }
  function copyCode() {
    const code = document.getElementById('code-box').innerText;
    navigator.clipboard.writeText(code).then(() => {
      document.getElementById('copy-btn').innerText = '✅ Kopyalandı!';
      setTimeout(() => { document.getElementById('copy-btn').innerText = '📋 Kodu Kopyala'; }, 2000);
    });
  }
  window.onload = function() {
    const code = getParam('code');
    const error = getParam('error');
    if (code) {
      document.getElementById('icon').innerText = '✅';
      document.getElementById('title').innerText = 'TikTok Bağlantısı Başarılı!';
      document.getElementById('code-box').innerText = code;
      document.getElementById('code-box').style.display = 'block';
      document.getElementById('copy-btn').style.display = 'inline-block';
      document.getElementById('msg').innerText = 'Aşağıdaki kodu kopyalayıp terminale yapıştır.';
      document.getElementById('step').style.display = 'block';
      localStorage.setItem('tiktok_auth_code', code);
    } else if (error) {
      document.getElementById('icon').innerText = '❌';
      document.getElementById('title').innerText = 'Bağlantı Başarısız';
      document.getElementById('msg').innerText = 'Hata: ' + error + '. Tekrar dene.';
    } else {
      document.getElementById('icon').innerText = '⚠️';
      document.getElementById('title').innerText = 'Kod Bulunamadı';
      document.getElementById('msg').innerText = 'URL parametresi eksik.';
    }
  };
</script>
</body>
</html>
